apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:kube-vip-role
rules:
  - apiGroups: [""]
    resources: ["services", "services/status", "nodes", "endpoints"]
    verbs: ["list","get","watch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["list", "get", "watch", "update", "create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: system:kube-vip-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-vip-role
subjects:
- kind: ServiceAccount
  name: kube-vip
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip-ds
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: kube-vip-ds
  template:
    metadata:
      labels:
        name: kube-vip-ds
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              # Target ONLY Control Plane nodes
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
      hostNetwork: true
      serviceAccountName: kube-vip
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
      containers:
      - name: kube-vip
        image: ghcr.io/kube-vip/kube-vip:v0.8.2
        imagePullPolicy: IfNotPresent
        args:
        - manager
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        env:
        # 1. Enable Layer 2 ARP
        - name: vip_arp
          value: "true"
        
        # 2. Bind to your Management Interface
        - name: vip_interface
          value: "ens18"
        
        # 3. Your Virtual IP
        - name: vip_address
          value: "192.168.8.8"
        
        # 4. Enable Leader Election (Required for HA)
        - name: vip_leaderelection
          value: "true"
        
        # 5. Tell it to watch the Control Plane
        - name: cp_enable
          value: "true"
        - name: cp_namespace
          value: kube-system
